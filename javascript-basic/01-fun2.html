<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>enjoy</title>
    <style>
        body{
            background: linear-gradient(135deg, #000000, #1a0010);
            color: white;
            text-align: center ;
            font-family: sans-serif;
        }

        h1{
            margin-top: 100px;
        }
        #count{
            font-size: 60px;
            margin: 20px;
        }

        button{
            border:none;
            background-color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 25px;
            border-radius: 50px;
            margin:20px;
            cursor: pointer;
            transition: 0,3s;
        }

        button:hover{
             background-color: #ff4d6d;
             color: white   ;
             transform: scale(1.1);
        }
    </style>
</head>

<body>
    <h1>Love counter 💖</h1>
    <div id="count">0</div>
    <div id="text">Click to show love</div>

    <button onclick="
    addLove()
    ">Add Love</button>

    <script>
        let love = 0;

        function addLove() {
            love ++
            document.getElementById('count').innerText = love;

            if(love == 5) {
                document.getElementById('text').innerText = 'You are loved!';
            }else if(love == 10) {
                document.getElementById('text').innerText = 'You are very loved!';
            }else if(love == 20) {
                document.getElementById('text').innerText = 'You are super loved!';
            }else if(love == 30) {
                document.getElementById('text').innerText = 'You are extremely loved!';
            }else if(love == 50) {
                document.getElementById('text').innerText = 'You are infinitely loved!';
            }
        }
    </script>

</body>
</html>
