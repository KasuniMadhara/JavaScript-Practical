<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fun code</title>
    <style>
        body{
            background: linear-gradient(135deg, #000000, #1a1a1a);
            color: white;
            text-align: center;
            font-family: sans-serif;
        }

        p{
            font-size: 50px;
            font-weight: bold;
            margin-top: 100px;
        }

        button{
            border: none;
            background-color: white;
            font-size: 15px;
            font-weight: bold;
            padding: 10px 20px;
            margin: 10px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover{
            background-color: #ff4d6d;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>

<body>

    <p id="text">Dhara DevVerse! ✨</p>

    <button onclick="changeText('Hello Dhara 💖')">Greeting</button>
    <button onclick="changeText('What is your issue? 🤔')">Issue</button>
    <button onclick="changeText('Keep going! You got this 🚀')">Motivate</button>

    <script>
        function changeText(message){
            document.getElementById("text").innerText = message;
        }
    </script>

</body>
</html>
