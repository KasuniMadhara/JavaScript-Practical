<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arrays and Loops</title>
</head>

<body>
    

    <script>
        const myArray = [10, 20, 30];
        console.log(myArray); //list of values
        console.log(myArray[0]); //first value
        myArray[0] = 100;
        console.log(myArray); //list of values after changing first value
        console.log(typeof myArray); //object (array is a type of objet)

        const arrayType = [1, 'Kasuni' , true, {name: 'Dinuka'}, [1,2]];
        console.log(Array.isArray(arrayType)); //true (check if arrayType is an array)
        console.log(arrayType.length); //5 (number of items in array)

        //add new value to the end of the array
        arrayType.push(30); //add 30 to the end of the array
        console.log(arrayType); //list of values after adding 30

        //remove
        arrayType.splice(0 , 1); //index we want to remove , number of items we want to remove
        console.log(arrayType); //list of values after removing first item


        //looooooooooooooooooooooooooooooooops

        //while loop
        let i = 1;

        while (i <= 5) {
            console.log(i);//print value of i
            i++; //increment i by 1
        }

        //for loop
        for (let i = 1; i <= 5; i++) {
            console.log(i); //print value of i
        }

        //random number using while
        let randomNUmber = 0;

        while (randomNUmber < 0.5) {
            randomNUmber = Math.random(); //generate a random number between 0 and 1
          
        }
         console.log(randomNUmber); //print the random number

        //array with loop
         const name = [
            'Kasuni',
            'Dinuka',
            'Madhara'
         ];

         for(let i = 0; i <= name.length; i++) {
            const value = name[i];
            console.log(value);
         }

         //1+ 1+ 3 (accumalator pattern)
         const num = [ 1, 1, 3];
         let total = 0;

         for(let i = 0; i < num.length; i++) {
            const nums = num[i];
            total += nums;
         }

         console.log(total);

         //double num = [ 1, 1, 3]; (2, 2, 6)
         const numbsDoubled = [];

         for(let i =0; i < num.length; i++) {
            const nums = num[i];
            numbsDoubled.push(nums * 2);
         }

         console.log(numbsDoubled);




        </script>
</body>
</html>
