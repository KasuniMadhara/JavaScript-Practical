<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <p>Rock Paper Scissors</p>

    <button onclick="playGame('Rock')">Rock</button>
    <button onclick="playGame('Paper')">Paper</button>
    <button onclick="playGame('Scissors')">Scissors</button>
    <button onclick="  
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score'); //remove score from localStorage
    ">Reset score</button>


    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };
/*
        if(!score)  { //if score is null, initialize it
            score = {
                wins: 0,
                losses: 0,
                ties: 0
            };
        };
        */
          
        //localStorage.getItem('score'); //get value of message from localStorage
        //console.log(JSON.parse(localStorage.getItem('score'))); //convert JSON string back to object and log it

        function playGame(playerMove) {

            const computerMove = pickComputerMove();
            let result = '';

            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie';
                } else if (computerMove === 'Paper') {
                    result = 'You lose';
                } else if (computerMove === 'Scissors') {
                    result = 'You win';
                }

            } else if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You win';
                } else if (computerMove === 'Paper') {
                    result = 'Tie';
                } else if (computerMove === 'Scissors') {
                    result = 'You lose';
                }

            } else if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose';
                } else if (computerMove === 'Paper') {
                    result = 'You win';
                } else if (computerMove === 'Scissors') {
                    result = 'Tie';
                }

            }

            if(result === 'You win' ) {
                score.wins += 1;
            } else if (result === 'You lose') {
                score.losses += 1;
            }else if(result === 'Tie') {
                score.ties += 1;
            }
            
            localStorage.setItem('score', JSON.stringify(score)); //store value of message in localStorage , convert object to JSON string before storing

                alert(`You chose ${playerMove}, computer choose ${computerMove}. ${result}
Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`
                );
            }

        


        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 0.33) {
                computerMove = 'Rock';
            } else if (randomNumber >= 0.33 && randomNumber < 0.66) {
                computerMove = 'Paper';
            } else if (randomNumber >= 0.66 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            return computerMove; //return the value of computerMove to the caller
            console.log('hiii'); //not run anything after return
        }
    </script>

</body>

</html>
