<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Variables in JavaScript</title>
</head>

<body>
    <script>
        let variable1 = 3
        console.log(variable1); // This will log the value of variable1 to the console  

        let calculation = 2 + 2;
        console.log(calculation); // This will log the result of the calculation to the console 
        console.log(calculation + 5); // This will log the result of the calculation plus 5 to the console  

        let result = calculation + 2;
        console.log(result); // This will log the value of result to the console

        let message = 'hello';
        console.log(message); // This will log the value of message to the console           
        
        //let let = 5; // This will cause an error because 'let' is a reserved keyword in JavaScript
        //let let1 = 5; // This will work because 'let1' is not a reserved keyword
        //let 1let = 5; // This will also work because '1let' is not a reserved keyword, but not useful as variable names cannot start with a number
        //let na$@ = 5; // This will cause an error because variable names cannot contain special characters like $ and @

        variable1 = 10; // This will change the value of variable1 to 10
        console.log(variable1); // This will log the new value of variable1 to the console  

        variable1 = variable1 + 5; // This will add 5 to the current value of variable1 and assign it back to variable1
        console.log(variable1); // This will log the updated value of variable1 to the console

    </script>

</body>
</html>
