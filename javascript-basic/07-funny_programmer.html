<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Functions</title>
</head>

<body>

    
    <script>
function programmerLoveStory() {

    let boy = "Programmer";
    let girl = "Beautiful Girl";
    let bug = true; // Simulating a bug in the love story

    console.log(boy + " meets " + girl + " 💖");
    console.log(boy + ": Hello, can I commit my heart to your repository?");

    if (bug) {
        console.log(girl + ": Sorry... your love has too many bugs 🐛");
        console.log(boy + ": Don't worry, I will debug my love for you!");
        bug = false; 
    }

    if (!bug) {
        console.log(girl + ": Okay... your love is now bug-free ❤️");
        console.log("Relationship Status: Successfully Deployed 🚀");
    }
}

programmerLoveStory();
    </script>
</body>     
</html>
