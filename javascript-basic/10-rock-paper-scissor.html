<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
    <style>
        body{
            background-color: rgb(25, 25, 25);
            color:white;
            font-family: Arial;

            .title{
                font-size: 30px;
                font-weight: bold;
            }

            .move-icon{
                height: 50px;
            }

            .move-button{
                background-color: transparent;
                border:3px solid white;/*1.border width(how thick the border is) 2.border style(solid, dashed, dotted, etc.) 3.border color*/
                color: white;
                height: 100px;
                width: 100px; 
                border-radius: 60px;
                margin-right: 10px;
                cursor: pointer;
            }

            .result{
                font-size: 25px;
                font-weight: bold;
                margin-top: 50px;
            }

            .score{
                margin-top: 50px;
            }

            .reset-score-button{
                background-color: white;
                border:none;
                font-size: 15px;
                padding: 8px 15px;
                cursor: pointer;;
            }
        }
    </style>
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button onclick="playGame('Rock');" class="move-button"><img src="images/rock-emoji.png" class="move-icon"></button>
    <button onclick="playGame('Paper');" class="move-button"><img src="images/paper-emoji.png" class="move-icon"></button>
    <button onclick="playGame('Scissors');" class="move-button"><img src="images/scissors-emoji.png" class="move-icon"></button>

    <p class="js-result result">You win.</p>
    <p class="js-moves"></p>
    <p class="js-score score"></p>
    

    <button onclick="  
        score.wins = 0;
        score.losses = 0;
        score.ties = 0;
        localStorage.removeItem('score'); //remove score from localStorage
        updateScoreElement(); //update score element after resetting score
    "class="reset-score-button">Reset score</button>


    <script>
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };

        

       updateScoreElement(); //update score element on page load
/*
        if(!score)  { //if score is null, initialize it
            score = {
                wins: 0,
                losses: 0,
                ties: 0
            };
        };
        */
          
        //localStorage.getItem('score'); //get value of message from localStorage
        //console.log(JSON.parse(localStorage.getItem('score'))); //convert JSON string back to object and log it

        function playGame(playerMove) {

            const computerMove = pickComputerMove();
            let result = '';

            if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie';
                } else if (computerMove === 'Paper') {
                    result = 'You lose';
                } else if (computerMove === 'Scissors') {
                    result = 'You win';
                }

            } else if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You win';
                } else if (computerMove === 'Paper') {
                    result = 'Tie';
                } else if (computerMove === 'Scissors') {
                    result = 'You lose';
                }

            } else if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose';
                } else if (computerMove === 'Paper') {
                    result = 'You win';
                } else if (computerMove === 'Scissors') {
                    result = 'Tie';
                }

            }



            if(result === 'You win' ) {
                score.wins += 1;
            } else if (result === 'You lose') {
                score.losses += 1;
            }else if(result === 'Tie') {
                score.ties += 1;
            }
            
            localStorage.setItem('score', JSON.stringify(score)); //store value of message in localStorage , convert object to JSON string before storing

            updateScoreElement(); //update score element after updating score

            document.querySelector('.js-result').innerHTML = `${result}`; //display result of the game
            document.querySelector('.js-moves').innerHTML = `You
        <img src="images/${playerMove}-emoji.png" class="move-icon" >
        <img src="images/${computerMove}-emoji.png" class="move-icon">
        Computer`;
            }
        
            function updateScoreElement() {
                document.querySelector('.js-score').
                innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
            }

        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 0.33) {
                computerMove = 'Rock';
            } else if (randomNumber >= 0.33 && randomNumber < 0.66) {
                computerMove = 'Paper';
            } else if (randomNumber >= 0.66 && randomNumber < 1) {
                computerMove = 'Scissors';
            }

            return computerMove; //return the value of computerMove to the caller
            console.log('hiii'); //not run anything after return
        }
    </script>

</body>

</html>
