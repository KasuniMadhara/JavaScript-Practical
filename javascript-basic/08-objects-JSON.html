<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Objects JSON</title>
</head>

<body>

    <script>
        const product = {
            name: 'socks',
            price: 1090,

            ['delivery-time']: '5 days', //property name with special characters, must be accessed using bracket notation

            rating: { //nested object
                stars: 4.5,
                reviews: 100
            },

            fun: function function1() { //method
                console.log('Function inside object is called method');
            }
        };

        JSON.stringify(product); //convert object to JSON string
        console.log(JSON.stringify(product));

        console.log(typeof JSON.stringify(product)); //JSON string is of type string

        const jsonString = JSON.stringify(product);
        //JSON.parse(jsonString); //convert JSON string back to object
        console.log(JSON.parse(jsonString));

        
        
    </script>

</body>
</html>
