<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Booleans</title>
</head>

<body>
    <script>
        console.log(3<5); // true
        console.log(3>5); // false

        console.log(typeof 'true'); // string
        console.log(typeof true); // boolean

        console.log(5 == '5.00'); //true
        console.log(5 === '5.00'); //false

        console.log(3 > 5 -5  ); //true

        if(false) {
            console.log('hello');
        } else {
            console.log('bye');
        }

        if(30 >= 16) {
            console.log('30 is greater than or equal to 16');
        }else {
            console.log('30 is less than 16');
        }

        if(20 > 25){
            console.log('You can drive');
        } else if(20 > 15) {
            console.log('Almost there!');
        } else{
            console.log('You cannot drive');
        }

        const age =15;

        if(age >= 16){
            console.log('You can drive');
        } else if(age >= 14) {
            console.log('Almost there!');
        } else{
            console.log('You cannot drive');
        }

        console.log(!0); // true
        console.log(!1); // false
        console.log('text' / 5); // NaN
        console.log(!('text' / 5)); // true

        let x;
        console.log(x); // undefined

        const y = undefined;
        console.log(y); // undefined

        const result = true? 'yes' : 'no';
        console.log(result); // yes

        //AND operator
        console.log(true && true); // true
        const result2 = 0? 'yes' : 'no';
        console.log(result2); // yes

        const msg = false && console.log('1.This will not be printed'); // false
        console.log(msg); // false

        true && console.log('2.This will be printed'); // true

        //OR operator
        console.log(true || false); // true
        const result3 = 0 || 'default';
        console.log(result3); // default
    </script>

</body>
</html>
