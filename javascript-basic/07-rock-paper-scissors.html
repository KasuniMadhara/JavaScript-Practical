<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rock Paper Scissors</title>
</head>

<body>
    <p>Rock Paper Scissors</p>
    <button onclick="
       const computerMove = pickComputerMove();

        let result = '';

        if(computerMove === 'Rock') {
            result = 'Tie';
        } else if (computerMove === 'Paper') {
            result = 'You lose';
        } else if (computerMove === 'Scissors') {
            result = 'You win';
        }

        alert(`You chose Rock, computer chose ${computerMove}. ${result}`);
        
    ">Rock</button>


    <button onclick="
        const computerMove = pickComputerMove();

        let result = '';

        if(computerMove === 'Rock') {
            result = 'You win';
        
        } else if (computerMove === 'Paper') {
            result = 'Tie';
        } else if (computerMove === 'Scissors') {
            result = 'You lose';
        }

        alert(`You chose Paper, computer chose ${computerMove}. ${result}`);
    ">Paper</button>

    <button onclick="
        const computerMove = pickComputerMove();

        let result = '';

        if(computerMove === 'Rock') {
            result = 'You lose';
        } else if (computerMove === 'Paper') {
            result = 'You win';
        } else if (computerMove === 'Scissors') {
            result = 'Tie';
        }

        alert(`You chose Paper, computer chose ${computerMove}. ${result}`);
    ">Scissors</button>


    <script>
        

        function pickComputerMove() {
            const randomNumber = Math.random();

            let computerMove = '';

            if(randomNumber >= 0 && randomNumber < 0.33) {
                computerMove = 'Rock';
            } else if (randomNumber >= 0.33 && randomNumber < 0.66) {
                computerMove = 'Paper';
            } else if (randomNumber >= 0.66 && randomNumber <1){
                computerMove = 'Scissors';
            }

            return computerMove; //return the value of computerMove to the caller
            console.log('hiii'); //not run anything after return
        }
    </script>
