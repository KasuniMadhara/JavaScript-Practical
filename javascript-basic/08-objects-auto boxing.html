<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Auto boxing</title>
</head>

<body>

    <script>
        console.log('hello' .length); //auto boxing, string is converted to String object to access length property
        console.log('hello' .toUpperCase()); //auto boxing, string is converted to String object to access toUpperCase method
    </script>
</body>
</html>
